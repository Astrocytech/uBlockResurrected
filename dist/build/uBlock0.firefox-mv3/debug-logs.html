<!DOCTYPE html>
<html>
<head>
    <title>uBlock Origin - Epicker Debug Logs</title>
    <style>
        body { font-family: monospace; background: #222; color: #0f0; padding: 20px; }
        h1 { color: #fff; }
        #logs { white-space: pre-wrap; font-size: 11px; max-height: 90vh; overflow: auto; }
        button { padding: 10px 20px; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Epicker Debug Logs</h1>
    <button id="refresh">Refresh</button>
    <button id="clear">Clear</button>
    <button id="download">Download as File</button>
    <div id="logs">Loading...</div>
    <script>
        async function loadLogs() {
            const logs = await browser.runtime.sendMessage({what: 'getEpickerLogs'});
            document.getElementById('logs').textContent = logs.join('\n') || 'No logs';
        }
        document.getElementById('refresh').onclick = loadLogs;
        document.getElementById('clear').onclick = async () => {
            await browser.runtime.sendMessage({what: 'clearEpickerLogs'});
            loadLogs();
        };
        document.getElementById('download').onclick = async () => {
            const logs = await browser.runtime.sendMessage({what: 'getEpickerLogs'});
            const blob = new Blob([logs.join('\n')], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'epicker-debug-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.log';
            a.click();
            URL.revokeObjectURL(url);
        };
        loadLogs();
    </script>
</body>
</html>
