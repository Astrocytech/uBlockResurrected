<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TEST - minimal inline styles</title>
<style>
/* All inline styles - no external CSS */
body {
    font-family: Arial, sans-serif;
    font-size: 14px;
    margin: 0;
    padding: 10px;
    background: #f0f0f2;
    color: #000;
}
#panes {
    display: flex;
    flex-direction: row;
}
#main {
    min-width: 200px;
}
#sticky {
    background: #e8e8ec;
    padding: 10px;
}
#hostname {
    font-weight: bold;
}
.toolRibbon {
    padding: 10px 0;
}
.fa-icon {
    display: inline-block;
    padding: 4px;
    margin: 2px;
    background: #ccc;
    border-radius: 4px;
}
hr {
    margin: 10px 0;
    border: 0;
    border-top: 1px solid #ccc;
}
</style>
</head>
<body>
<div id="panes">
    <div id="main">
        <div id="sticky">
            <div id="hostname">example.com</div>
            <div id="stickyTools">
                <span class="fa-icon">SAVE</span>
                <span class="fa-icon">POWER</span>
            </div>
        </div>
        <hr>
        <div id="basicStats">
            <span>Blocked: 0</span>
        </div>
    </div>
    <div id="firewall">
        <div>Firewall rules here</div>
    </div>
</div>
</body>
</html>
